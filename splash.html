<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MoneyMind</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:#111827;
      --text:#e2e8f0;
      --muted:#94a3b8;
      --accent:#2dd4bf;
      --accent-dark:#022c22;
      --border:rgba(45,212,191,.18);
      --glow:rgba(45,212,191,.15);
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 0%, rgba(45,212,191,.15), transparent 60%),
        radial-gradient(900px 600px at 80% 100%, rgba(45,212,191,.08), transparent 60%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:640px;
      text-align:center;
      padding:36px 28px;
      border:1px solid var(--border);
      border-radius:28px;
      background:rgba(17,24,39,.72);
      backdrop-filter:blur(10px);
      box-shadow:0 20px 80px rgba(0,0,0,.35);
    }

    .logo-card{
      width:110px;
      height:110px;
      margin:0 auto 24px;
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(45,212,191,.14), rgba(45,212,191,.06));
      border:1px solid rgba(45,212,191,.28);
      box-shadow:0 0 0 1px rgba(255,255,255,.02) inset;
      overflow:hidden;
    }

    .logo-card img{
      width:78px;
      height:auto;
      display:block;
      object-fit:contain;
    }

    .logo-fallback{
      width:42px;
      height:42px;
      display:none;
    }

    h1{
      margin:0;
      font-size:38px;
      line-height:1.05;
      letter-spacing:-1px;
    }

    .tagline{
      margin:16px auto 0;
      max-width:520px;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
    }

    .tagline strong{
      color:var(--text);
      font-weight:700;
    }

    .cta-row{
      margin-top:30px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:15px 24px;
      font-size:15px;
      font-weight:800;
      background:var(--accent);
      color:var(--accent-dark);
      cursor:pointer;
      transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
      box-shadow:0 10px 30px rgba(45,212,191,.22);
    }

    .btn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 36px rgba(45,212,191,.28);
    }

    .subcta{
      font-size:13px;
      color:var(--muted);
    }

    .meta{
      margin-top:28px;
      font-size:12px;
      color:var(--muted);
      opacity:.9;
    }

    @media (max-width:640px){
      .wrap{
        padding:30px 22px;
        border-radius:24px;
      }

      .logo-card{
        width:96px;
        height:96px;
        border-radius:24px;
      }

      h1{
        font-size:32px;
      }

      .tagline{
        font-size:15px;
      }
    }
  </style>
</head>
<body>

  <main class="wrap">
    <div class="logo-card">
      <img
        src="/assets/Moneymind-logo.png.jpg"
        alt="MoneyMind logo"
        onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block';"
      >

      <svg class="logo-fallback" viewBox="0 0 48 48" fill="none" aria-hidden="true">
        <rect x="4" y="4" width="40" height="40" rx="12"
              fill="rgba(45,212,191,0.15)"
              stroke="rgba(45,212,191,0.45)" stroke-width="2"/>
        <path d="M14 32V16L24 26L34 16V32"
              stroke="#2dd4bf"
              stroke-width="3"
              stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <h1>MoneyMind</h1>

    <p class="tagline">
      Financial clarity for people who want to build real wealth.
      <br>
      <strong>Start with your Financial Roast</strong> and see what your money structure is really doing.
    </p>

    <div class="cta-row">
      <button class="btn" onclick="location.href='roast.html'">
        Start Your Roast
      </button>
      <div class="subcta">Takes about 60 seconds</div>
    </div>

    <div class="meta">
      Private MVP • Early tester access
    </div>
  </main>

</body>
</html>
