<!doctype html>

<img src="/assets/moneymind-logo.jpg" 
     alt="MoneyMind"
     style="width:240px; height:auto;">
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>MoneyMind</title>

<style>
:root{
--bg:#0b1220;
--text:#e2e8f0;
--muted:#94a3b8;
--accent:#2dd4bf;
}

body{
margin:0;
font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:
radial-gradient(1200px 800px at 20% 0%, rgba(45,212,191,.15), transparent 60%),
var(--bg);
color:var(--text);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.wrap{
text-align:center;
max-width:620px;
padding:30px;
}

.logo{
width:60px;
height:60px;
margin:0 auto 20px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:22px;
background:rgba(45,212,191,.15);
border:1px solid rgba(45,212,191,.35);
}

h1{
margin:0;
font-size:34px;
letter-spacing:-0.5px;
}

p{
margin-top:14px;
color:var(--muted);
font-size:16px;
line-height:1.5;
}

button{
margin-top:30px;
padding:14px 22px;
font-size:15px;
font-weight:700;
border-radius:999px;
border:none;
background:var(--accent);
color:#022c22;
cursor:pointer;
transition:transform .15s ease;
}

button:hover{
transform:translateY(-1px);
}

.meta{
margin-top:30px;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="wrap">

<div class="logo">
<svg width="34" height="34" viewBox="0 0 48 48" fill="none">
  <rect x="4" y="4" width="40" height="40" rx="12"
        fill="rgba(45,212,191,0.15)"
        stroke="rgba(45,212,191,0.45)" stroke-width="2"/>
  <path d="M14 32V16L24 26L34 16V32"
        stroke="#2dd4bf"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
</div>

<h1>MoneyMind</h1>

<p>
A financial intelligence platform that helps you make better financial decisions
so sustainable wealth becomes a logical outcome.
</p>

<button onclick="location.href='hub.html'">
Enter MoneyMind
</button>

<div class="meta">
Private MVP • Early tester access
</div>

</div>

</body>
</html>
