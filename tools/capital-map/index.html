<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoneyMind • Cost of Delay</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mm-wrap">

  <div class="mm-card mm-hero">

    <h1>Cost of Delay</h1>

    <p>
      See what waiting could cost your future wealth.
      Compounding rewards time — delaying reduces its power.
    </p>


    <!-- INPUTS -->

    <div class="mm-grid mm-grid3">

      <div class="mm-field">
        <label>Monthly Investment</label>
        <div class="mm-input">
          <span>€</span>
          <input id="monthly" type="number" value="500">
        </div>
      </div>

      <div class="mm-field">
        <label>Expected Annual Return</label>
        <div class="mm-input">
          <input id="return" type="number" value="7">
          <span>%</span>
        </div>
      </div>

      <div class="mm-field">
        <label>Target Age</label>
        <div class="mm-input">
          <input id="targetAge" type="number" value="65">
        </div>
      </div>

    </div>


    <div class="mm-grid mm-grid3">

      <div class="mm-field">
        <label>Start Age</label>
        <div class="mm-input">
          <input id="startAge" type="number" value="30">
        </div>
      </div>

      <div class="mm-field">
        <label>Delayed Start Age</label>
        <div class="mm-input">
          <input id="delayAge" type="number" value="40">
        </div>
      </div>

      <div class="mm-field">
        <label>&nbsp;</label>
        <button class="mm-btn" id="calculateBtn">
          Calculate Cost of Waiting
        </button>
      </div>

    </div>


    <!-- RESULT -->

    <div id="resultBlock" class="mm-result" style="display:none;">

      <div class="mm-resultRow">

        <div class="mm-metric">
          <div class="mm-big" id="startNowValue">€0</div>
          <div class="mm-sub">Start Now</div>
        </div>

        <div class="mm-divider"></div>

        <div class="mm-metric">
          <div class="mm-big" id="startLaterValue">€0</div>
          <div class="mm-sub">Start Later</div>
        </div>

      </div>

      <div class="mm-impact">

        <div class="mm-impactMain" id="delayImpact">
          Waiting could cost you €0 in future wealth.
        </div>

        <div class="mm-impactSub">
          Time is the most powerful factor in wealth building.
        </div>

      </div>

    </div>

  </div>

</div>


<script src="app.js"></script>

</body>
</html>
