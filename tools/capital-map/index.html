<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoneyMind • Capital Map</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="mm-wrap">

  <div class="mm-card mm-hero">

    <h1>Capital Map</h1>

    <p>
      Understand where your capital currently sits. 
      Mapping your assets is the first step toward building wealth.
    </p>

    <div class="mm-grid mm-grid3">

      <div class="mm-field">
        <label>Cash / Savings</label>
        <div class="mm-input">
          <span>€</span>
          <input id="cash" type="number" value="10000">
        </div>
      </div>

      <div class="mm-field">
        <label>Investments</label>
        <div class="mm-input">
          <span>€</span>
          <input id="investments" type="number" value="25000">
        </div>
      </div>

      <div class="mm-field">
        <label>Other Assets</label>
        <div class="mm-input">
          <span>€</span>
          <input id="otherAssets" type="number" value="0">
        </div>
      </div>

    </div>

    <button class="mm-btn" id="calculateBtn">
      Calculate Total Capital
    </button>

    <div id="resultBlock" class="mm-result" style="display:none;">

      <div class="mm-resultRow">

        <div class="mm-metric">
          <div class="mm-big" id="totalCapital">€0</div>
          <div class="mm-sub">Total Capital</div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
