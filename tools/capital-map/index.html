<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Capital Map — MoneyMind</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <div class="brand">Money<span>Mind</span></div>
    <a href="/apps/dashboard/" class="topbar-back">← Dashboard</a>
  </div>

  <main class="shell">

    <div class="card intro-card">
      <div class="eyebrow">Capital Map</div>
      <h1>Where does your money actually sit?</h1>
      <p class="lead">Split your total capital across three categories. Best guess is fine — this is about structure, not precision.</p>
    </div>

    <div class="card form-card">

      <div class="field-group">
        <label class="field-label" for="direct">
          <span class="field-title">Direct</span>
          <span class="field-hint">Cash, current account — available today</span>
        </label>
        <div class="input-wrap">
          <span class="currency">€</span>
          <input type="number" id="direct" placeholder="0" min="0" />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="accessible">
          <span class="field-title">Accessible</span>
          <span class="field-hint">Savings, investments you can sell within days</span>
        </label>
        <div class="input-wrap">
          <span class="currency">€</span>
          <input type="number" id="accessible" placeholder="0" min="0" />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="locked">
          <span class="field-title">Locked</span>
          <span class="field-hint">Pension, property equity — not easily touched</span>
        </label>
        <div class="input-wrap">
          <span class="currency">€</span>
          <input type="number" id="locked" placeholder="0" min="0" />
        </div>
      </div>

      <div class="summary" id="summary" hidden>
        <span class="summary-label">Total capital</span>
        <span class="summary-value" id="total-value">€ 0</span>
      </div>

      <button class="btn btn-primary" id="save-btn">Save to dashboard</button>

    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
