<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — MoneyMind</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #2dd4bf;
      --accent-dark: #022c22;
      --border: rgba(45,212,191,.16);
      --border-soft: rgba(148,163,184,.14);
      --shadow: 0 18px 40px rgba(0,0,0,.30);
      --radius: 24px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 800px at 20% 0%, rgba(45,212,191,.15), transparent 60%),
        radial-gradient(800px 700px at 90% 100%, rgba(45,212,191,.08), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 18px;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(17,24,39,.82);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 36px 32px;
    }

    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .78rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }

    .lead {
      color: var(--muted);
      font-size: .97rem;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 14px;
    }

    input[type="email"]:focus {
      border-color: rgba(45,212,191,.5);
    }

    input[type="email"]::placeholder {
      color: var(--muted);
      opacity: 0.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      padding: 15px 24px;
      font-weight: 800;
      font-family: inherit;
      font-size: 15px;
      transition: .15s ease;
    }

    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-dark);
    }

    .btn-secondary {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border-soft);
      color: var(--text);
      margin-top: 12px;
      text-decoration: none;
    }

    .message {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      min-height: 18px;
    }

    .message.success { color: var(--accent); }
    .message.error   { color: #f87171; }

    .divider {
      border: none;
      border-top: 1px solid var(--border-soft);
      margin: 24px 0;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">MoneyMind</div>
    <h1>Save your progress.</h1>
    <p class="lead">Enter your email and we send you a magic link. No password needed.</p>

    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    <button class="btn btn-primary" id="send-btn">Send magic link</button>

    <div class="message" id="msg"></div>

    <hr class="divider" />

    <a href="/apps/dashboard/" class="btn btn-secondary">Skip for now — continue without saving</a>
  </div>

  <script>
    const btn = document.getElementById('send-btn');
    const input = document.getElementById('email');
    const msg = document.getElementById('msg');

    btn.addEventListener('click', async () => {
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        msg.textContent = 'Please enter a valid email.';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      msg.textContent = 'Sending...';
      msg.className = 'message';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, action: 'magic-link' })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        msg.textContent = 'Magic link sent. Check your inbox.';
        msg.className = 'message success';
        input.value = '';
      } catch (err) {
        msg.textContent = err.message || 'Could not send link. Try again.';
        msg.className = 'message error';
        btn.disabled = false;
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>

</body>
</html>
