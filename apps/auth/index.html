<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — MoneyMind</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #e8e8e8;
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .sub {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="email"] {
      width: 100%;
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }

    input[type="email"]:focus {
      border-color: #c8f060;
    }

    button {
      width: 100%;
      background: #c8f060;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.02em;
    }

    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      font-size: 14px;
      color: #888;
      text-align: center;
      min-height: 20px;
    }

    .message.success { color: #c8f060; }
    .message.error { color: #ff6b6b; }

    .skip {
      margin-top: 32px;
      text-align: center;
      font-size: 13px;
      color: #555;
    }

    .skip a {
      color: #888;
      text-decoration: none;
      border-bottom: 1px solid #333;
      padding-bottom: 1px;
    }

    .skip a:hover { color: #e8e8e8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">MoneyMind</div>
    <h1>Save your progress.</h1>
    <p class="sub">Enter your email and we send you a magic link. No password needed.</p>

    <label for="email">Your email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    <button id="send-btn">Send magic link</button>

    <div class="message" id="msg"></div>

    <div class="skip">
      <a href="/apps/dashboard/">Skip for now and continue without saving</a>
    </div>
  </div>

  <script>
    const btn = document.getElementById('send-btn');
    const input = document.getElementById('email');
    const msg = document.getElementById('msg');

    btn.addEventListener('click', async () => {
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        msg.textContent = 'Please enter a valid email.';
        msg.className = 'message error';
        return;
      }

      btn.disabled = true;
      msg.textContent = 'Sending...';
      msg.className = 'message';

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, action: 'magic-link' })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Something went wrong');

        msg.textContent = 'Magic link sent. Check your inbox.';
        msg.className = 'message success';
        input.value = '';
      } catch (err) {
        msg.textContent = err.message || 'Could not send link. Try again.';
        msg.className = 'message error';
        btn.disabled = false;
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });
  </script>
</body>
</html>
